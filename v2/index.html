<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SummerHub 2026 v2 - 暑期活動一覽</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2C3E50;
            --light: #F7F9FC;
            --success: #95E1D3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        /* Header */
        .header {
            background: white;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.875rem;
            color: #666;
        }

        /* Search & Filters */
        .filters {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .search-box {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        .filter-selects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .filter-select {
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        .filter-select option {
            padding: 0.5rem;
        }

        /* Activity Grid */
        .activities-grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .activity-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .activity-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .card-image-bg {
            height: 0;
            padding-bottom: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 0.3s;
        }

        .activity-card.has-image .card-image-bg {
            height: 180px;
            padding-bottom: 0;
        }

        .card-content {
            padding: 1.5rem;
            flex: 1;
        }

        .card-category {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: var(--accent);
            color: var(--dark);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            line-height: 1.4;
            color: var(--dark);
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: #666;
        }

        .info-icon {
            width: 16px;
            text-align: center;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #f0f0f0;
        }

        .card-fee {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .card-fee.free {
            color: var(--success);
        }

        .card-source {
            font-size: 0.75rem;
            color: #999;
            font-weight: 600;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 2rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .modal-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .modal-body {
            padding: 2rem;
        }

        .modal-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .modal-details {
            display: grid;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .modal-link {
            display: block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            margin-top: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .modal-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .detail-row {
            display: flex;
            gap: 1rem;
        }

        .detail-label {
            font-weight: 600;
            color: #666;
            min-width: 80px;
        }

        .detail-value {
            color: var(--dark);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 4rem;
            color: white;
            font-size: 1.5rem;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .stats {
                justify-content: center;
            }

            .activities-grid {
                grid-template-columns: 1fr;
                padding: 0 1rem 1rem;
            }

            .filters {
                padding: 1rem;
            }
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 4rem;
            color: white;
            font-size: 1.25rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <div class="logo">🌞 SummerHub 2026 v2</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="total-count">0</div>
                    <div class="stat-label">活動總數</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="free-count">0</div>
                    <div class="stat-label">免費活動</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="category-count">0</div>
                    <div class="stat-label">類別</div>
                </div>
            </div>
        </div>
    </header>

    <!-- Filters -->
    <section class="filters">
        <input type="text" class="search-box" id="search-input" placeholder="🔍 搜尋活動名稱、地點...">
        <div class="filter-selects">
            <select class="filter-select" id="monthFilter">
                <option value="all">📅 全部月份</option>
                <option value="summer">☀️ 暑期 (6-8 月)</option>
                <option value="6">6️⃣ 6 月</option>
                <option value="7">7️⃣ 7 月</option>
                <option value="8">8️⃣ 8 月</option>
            </select>
            <select class="filter-select" id="categoryFilter">
                <option value="all">📋 全部類別</option>
                <option value="音樂、藝術及文化">🎨 音樂、藝術及文化</option>
                <option value="體育、烹飪及身心靈">⚽ 體育、烹飪及身心靈</option>
                <option value="數碼及媒體技能">💻 數碼及媒體技能</option>
                <option value="戶外活動">🏕️ 戶外活動</option>
                <option value="個人成長及社會服務">🌱 個人成長及社會服務</option>
                <option value="其他">📌 其他</option>
            </select>
            <select class="filter-select" id="ageFilter">
                <option value="all">👶 全部年齡</option>
                <option value="preschool">🧒 學齡前 (3-5 歲)</option>
                <option value="primary">🎒 小學生 (6-12 歲)</option>
                <option value="secondary">📚 中學生 (13-18 歲)</option>
                <option value="youth">🎓 青少年 (19-24 歲)</option>
                <option value="adult">👨‍💼 成人 (25 歲+)</option>
                <option value="all ages">👨‍👩‍👧‍👦 不限年齡</option>
            </select>
            <select class="filter-select" id="orgFilter">
                <option value="all">🏢 全部機構</option>
            </select>
            <select class="filter-select" id="priceFilter">
                <option value="all">💰 全部價格</option>
                <option value="free">✅ 免費活動</option>
                <option value="paid">💵 付費活動</option>
                <option value="under100">$100 以下</option>
                <option value="under200">$200 以下</option>
                <option value="under500">$500 以下</option>
            </select>
        </div>
    </section>

    <!-- Activities Grid -->
    <main class="activities-grid" id="activities-grid">
        <div class="loading">
            <div class="spinner"></div>
            載入活動中...
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <img class="modal-image" id="modal-image" src="" alt="">
            <div class="modal-body">
                <h2 class="modal-title" id="modal-title"></h2>
                <span class="card-category" id="modal-category"></span>
                <div class="modal-details" id="modal-details">
                </div>
                <div class="card-footer">
                    <div class="card-fee" id="modal-fee"></div>
                    <div class="card-source" id="modal-source"></div>
                </div>
                <a href="#" class="modal-link" id="modal-link" target="_blank">🔗 前往報名網頁</a>
            </div>
        </div>
    </div>

    <script>
        let activities = [];
        let filteredActivities = [];
        let currentCategory = 'all';
        let currentOrg = 'all';
        let currentAge = 'all';
        let currentMonth = 'all';
        let currentPrice = 'all';
        
        // Parse month from time string
        function parseMonth(timeStr) {
            if (!timeStr) return null;
            const match = timeStr.match(/(\d+)月/);
            return match ? parseInt(match[1]) : null;
        }
        
        // Check if activity matches month filter
        function matchMonthFilter(activity, monthFilter) {
            if (monthFilter === 'all') return true;
            
            const month = parseMonth(activity.time);
            if (!month) return false;
            
            if (monthFilter === 'summer') {
                return month >= 6 && month <= 8;
            }
            
            return month === parseInt(monthFilter);
        }
        
        // Parse age range from text
        function parseAgeRange(ageText) {
            if (!ageText || ageText.trim() === '') return { min: 0, max: 99 };
            
            // 提取數字
            const numbers = ageText.match(/\d+/g);
            if (!numbers || numbers.length === 0) return { min: 0, max: 99 };
            
            const min = parseInt(numbers[0]);
            const max = numbers.length > 1 ? parseInt(numbers[1]) : min;
            
            return { min, max };
        }
        
        // Check if activity matches age filter
        function matchAgeFilter(activity, ageFilter) {
            if (ageFilter === 'all') return true;
            
            const ageRange = parseAgeRange(activity.target_audience);
            const minAge = ageRange.min;
            const maxAge = ageRange.max;
            
            switch (ageFilter) {
                case 'preschool': // 3-5 歲
                    return minAge <= 5 && maxAge >= 3;
                case 'primary': // 6-12 歲
                    return minAge <= 12 && maxAge >= 6;
                case 'secondary': // 13-18 歲
                    return minAge <= 18 && maxAge >= 13;
                case 'youth': // 19-24 歲
                    return minAge <= 24 && maxAge >= 19;
                case 'adult': // 25 歲+
                    return minAge >= 25 || (minAge >= 18 && maxAge >= 35);
                case 'all ages': // 不限年齡
                    return minAge === 0 || activity.target_audience === '不限' || activity.target_audience === '';
                default:
                    return true;
            }
        }

        // Load activities
        async function loadActivities() {
            try {
                const response = await fetch('activities.json');
                const data = await response.json();
                activities = data.activities || [];  // ✅ 取 activities 數組
                filteredActivities = activities;
                updateStats();
                loadFilters();  // ✅ 加載篩選器選項
                renderActivities();
                setupFilters();  // ✅ 設置篩選器事件
            } catch (error) {
                console.error('Error loading activities:', error);
                document.getElementById('activities-grid').innerHTML = 
                    '<div class="no-results">載入失敗，請稍後再試</div>';
            }
        }

        // Update statistics
        function updateStats() {
            document.getElementById('total-count').textContent = activities.length;
            document.getElementById('free-count').textContent = 
                activities.filter(a => a.fee === 0 || a.fee === '免費' || a.fee === '').length;
            
            const categories = new Set(activities.map(a => a.category));
            document.getElementById('category-count').textContent = categories.size;
        }

        // Load filter options
        function loadFilters() {
            // Load organization filter
            const orgFilter = document.getElementById('orgFilter');
            if (orgFilter) {
                const organizations = [...new Set(activities.map(a => a.org_name).filter(o => o))];
                organizations.sort();
                organizations.forEach(org => {
                    const option = document.createElement('option');
                    option.value = org;
                    option.textContent = org;
                    orgFilter.appendChild(option);
                });
            }
        }

        // Render activities
        function renderActivities() {
            const grid = document.getElementById('activities-grid');
            
            if (filteredActivities.length === 0) {
                grid.innerHTML = '<div class="no-results">😅 找不到符合條件的活動</div>';
                return;
            }

            grid.innerHTML = filteredActivities.map(activity => {
                const hasImage = activity.image && activity.image.trim() !== '';
                const imageStyle = hasImage ? `background-image: url('${activity.image}');` : '';
                
                return `
                <div class="activity-card ${hasImage ? 'has-image' : ''}" onclick="openActivity('${activity.id}')">
                    <div class="card-image-bg" style="${imageStyle}"></div>
                    <div class="card-content">
                        <span class="card-category">${activity.category}</span>
                        <h3 class="card-title">${activity.name}</h3>
                        <div class="card-info">
                            <div class="info-item">
                                <span class="info-icon">📍</span>
                                <span>${activity.location || '需查詢'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-icon">👶</span>
                                <span>${activity.target_audience || '需查詢'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-icon">📅</span>
                                <span>${activity.time || activity.date_start || '需查詢'}</span>
                            </div>
                        </div>
                        <div class="card-footer">
                            <div class="card-fee ${activity.fee === 0 || activity.fee === '免費' || activity.fee === '' ? 'free' : ''}">
                                ${activity.fee || '需查詢'}
                            </div>
                            <div class="card-source">${activity.org_name || '未知機構'}</div>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        // Setup filters
        function setupFilters() {
            // Month filter (dropdown)
            const monthFilter = document.getElementById('monthFilter');
            if (monthFilter) {
                monthFilter.addEventListener('change', (e) => {
                    currentMonth = e.target.value;
                    filterActivities();
                });
            }

            // Category filter (dropdown)
            const categoryFilter = document.getElementById('categoryFilter');
            if (categoryFilter) {
                categoryFilter.addEventListener('change', (e) => {
                    currentCategory = e.target.value;
                    filterActivities();
                });
            }

            // Age filter (dropdown)
            const ageFilter = document.getElementById('ageFilter');
            if (ageFilter) {
                ageFilter.addEventListener('change', (e) => {
                    currentAge = e.target.value;
                    filterActivities();
                });
            }

            // Organization filter (dropdown)
            const orgFilter = document.getElementById('orgFilter');
            if (orgFilter) {
                orgFilter.addEventListener('change', (e) => {
                    currentOrg = e.target.value;
                    filterActivities();
                });
            }

            // Price filter (dropdown)
            const priceFilter = document.getElementById('priceFilter');
            if (priceFilter) {
                priceFilter.addEventListener('change', (e) => {
                    currentPrice = e.target.value;
                    console.log('Price filter changed to:', currentPrice);
                    filterActivities();
                });
            }

            // Search
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    filterActivities(e.target.value);
                });
            }
        }

        // Filter activities
        function filterActivities(searchText = '') {
            const priceFilter = document.getElementById('priceFilter');
            const currentPrice = priceFilter ? priceFilter.value : 'all';
            
            filteredActivities = activities.filter(activity => {
                const matchMonth = matchMonthFilter(activity, currentMonth);
                const matchCategory = currentCategory === 'all' || activity.category === currentCategory;
                const matchOrg = currentOrg === 'all' || activity.org_name === currentOrg;
                const matchAge = matchAgeFilter(activity, currentAge);
                const matchSearch = !searchText || 
                    activity.name.toLowerCase().includes(searchText.toLowerCase()) ||
                    (activity.location && activity.location.toLowerCase().includes(searchText.toLowerCase())) ||
                    (activity.org_name && activity.org_name.toLowerCase().includes(searchText.toLowerCase()));
                
                // Price filter logic
                let matchPrice = true;
                if (currentPrice !== 'all') {
                    const fee = activity.fee || '';
                    const feeAmount = parseFloat(String(activity.fee_amount || 0).replace(/[^0-9.]/g, '')) || 0;
                    
                    if (currentPrice === 'free') {
                        // Only truly free: fee_amount must be 0
                        matchPrice = (feeAmount == 0);
                    } else if (currentPrice === 'paid') {
                        // Paid: fee_amount must be > 0
                        matchPrice = (feeAmount > 0);
                    } else if (currentPrice === 'under100') {
                        matchPrice = (feeAmount > 0 && feeAmount <= 100);
                    } else if (currentPrice === 'under200') {
                        matchPrice = (feeAmount > 0 && feeAmount <= 200);
                    } else if (currentPrice === 'under500') {
                        matchPrice = (feeAmount > 0 && feeAmount <= 500);
                    }
                }
                
                return matchMonth && matchCategory && matchOrg && matchAge && matchSearch && matchPrice;
            });
            renderActivities();
        }

        // Open activity in new tab
        function openActivity(activityId) {
            // Convert to number for comparison
            const id = parseInt(activityId);
            const activity = activities.find(a => parseInt(a.id) === id);
            if (!activity) {
                console.error('Activity not found:', activityId);
                return;
            }

            // 如果有 URL，開新分頁
            if (activity.url && activity.url.trim() !== '') {
                console.log('Opening URL:', activity.url);
                window.open(activity.url, '_blank');
            } else {
                // 如果無 URL，顯示詳情 Modal
                console.log('No URL, showing modal');
                showActivityModal(activity);
            }
        }

        // Show activity modal (fallback when no URL)
        function showActivityModal(activity) {
            document.getElementById('modal-image').src = activity.image || '';
            document.getElementById('modal-title').textContent = activity.name;
            document.getElementById('modal-category').textContent = activity.category;
            document.getElementById('modal-fee').textContent = activity.fee || '需查詢';
            document.getElementById('modal-fee').className = 
                `card-fee ${activity.fee === 0 || activity.fee === '免費' || activity.fee === '' ? 'free' : ''}`;
            document.getElementById('modal-source').textContent = activity.org_name || '未知機構';
            
            // 設置來源連結
            const linkEl = document.getElementById('modal-link');
            if (activity.url && activity.url.trim() !== '') {
                linkEl.href = activity.url;
                linkEl.style.display = 'block';
            } else {
                linkEl.style.display = 'none';
            }

            // Build details
            const details = document.getElementById('modal-details');
            details.innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">地點：</span>
                    <span class="detail-value">${activity.location || '需查詢'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">對象：</span>
                    <span class="detail-value">${activity.target_audience || '需查詢'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">時間：</span>
                    <span class="detail-value">${activity.time || activity.date_start || '需查詢'}</span>
                </div>
                ${activity.description ? `
                <div class="detail-row">
                    <span class="detail-label">詳情：</span>
                    <span class="detail-value">${activity.description}</span>
                </div>
                ` : ''}
            `;

            document.getElementById('modal-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close modal on overlay click
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeModal();
            }
        });

        // Close modal on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize
        loadActivities();
    </script>
</body>
</html>
